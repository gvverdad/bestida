[paths]
base=/home/gvv/Projects/${main:app}
src=${base}/src

[sqlalchemy]
#url=sqlite:///${paths:src}/${main:app}.sqlite
url=postgresql://gvv:11gv1327@/bestida

[image]
location = ${paths:base}/images
public=/images
# bytes: 5 * 1024 * 1024 = 5MB
file_max_size = 5242880
formats = ["JPEG", "PNG", "WEBP"]

[dump]
location = ${paths:base}/dump

[workfile]
location = ${paths:base}/temp
# bytes: 10 * 1024 * 1024 = 10MB
file_max_size = 10485760
mime_types = ["text/plain", "application/csv"]

[release]
location = ${paths:base}/release

[static]
location = ${paths:src}/static
public=/static

[templates]
location = ${paths:src}/templates

[spooler]
location = ${paths:base}/spools
public=/spools
keepdays = 3

[cache]
tables=true
fields=true
# grids=false to allow debug
grids=false
# forms=false to allow child formSchema main_form=False option
forms=false
location = ${paths:base}/cache
# Time To Live (ttl) the amount of time (in seconds) that each item should be kept
# in the cache before being evicted.
# 60 seconds * 60 minutes * 24 hours = 86400 seconds
ttl = 86400

[jobqs]
keys = Express, Batch

[jobq_Batch]
start = true
# process interval in secs (check jobs every n seconds), defaults to 10 secs
interval = 10
# poolsize == 0 or not defined, will use cpu_count
# poolsize is number of process
poolsize = 1

[jobq_Express]
start = true
# process interval in secs (check jobs every n seconds), defaults to 10 secs
interval = 10
# poolsize == 0 or not defined, will use cpu_count
# poolsize is number of process
poolsize = 2

