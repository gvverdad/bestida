# openssl rand -hex 32
secret=1dc8c547a91188fc62ae9c22f1404d504e2894ef11cdb2008f1479867537b296
jwt_algorithm=HS256

[themes]
dark = dark
light = corporate

[defaults]
country=AU
currency=AUD
locale=en-au
timezone=Australia/Melbourne
