[logs]
location = ${paths:base}/logs

# logging configuration
[loggers]
keys = root, uvicorn, gunicorn.error, gunicorn.access, sqlalchemy

[handlers]
keys = rotatingFileRoot, rotatingFileUvicorn, rotatingFileGunicorn, rotatingFileGunicornAccess, rotatingFileSqlalchemy

[formatters]
keys = generic

# logging levels
#    CRITICAL: Critical errors that lead to a complete failure of the operation.
#    ERROR: Errors that prevent the successful execution of an operation.
#    WARNING: Warnings about potential issues or situations that may cause problems.
#    INFO: Informational messages that provide status updates and progress.
#    DEBUG: Detailed debugging messages that help diagnose issues.
#    NOTSET: The lowest logging level that disables all logging.
# sqlalchemy
# "level = INFO" logs SQL queries.
# "level = DEBUG" logs SQL queries and results.
# "level = WARNING" logs neither.  (Recommended for production systems.)
#
[logger_root]
level = DEBUG
handlers = rotatingFileRoot

[logger_uvicorn]
level = INFO
handlers = rotatingFileUvicorn
qualname = uvicorn

[logger_gunicorn.error]
level = INFO
handlers = rotatingFileGunicorn
qualname = gunicorn.error

[logger_gunicorn.access]
level = INFO
handlers = rotatingFileGunicornAccess
qualname = gunicorn.access

[logger_sqlalchemy]
level = WARNING
handlers = rotatingFileSqlalchemy
qualname = sqlalchemy.engine

# The logger level acts as an initial filter for log messages,
# and the handler level acts as a secondary filter for messages that pass the
# logger's filter
[handler_rotatingFileRoot]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=generic
args=('logs/root.log', 'midnight', 1, 30)

[handler_rotatingFileUvicorn]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=generic
args=('logs/uvicorn.log', 'midnight', 1, 30)

[handler_rotatingFileGunicorn]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=generic
args=('logs/gunicorn.log', 'midnight', 1, 30)

[handler_rotatingFileGunicornAccess]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=generic
args=('logs/access.log', 'midnight', 1, 30)

[handler_rotatingFileSqlalchemy]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=generic
args=('logs/sqlalchemy.log', 'midnight', 1, 30)

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s:%(lineno)s][%(threadName)s] %(message)s
