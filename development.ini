[main]
app=bestida
title=Bestida
description=Bestida
language=en-AU
app_homepage=https://google.com.au/
app_version=0.1.0
api_version=v1
api_path=/api/${api_version}
openapi_url=${api_path}/${app}.json
host=localhost
port=5100
# Uvicorn worker processes/threads to handle incoming requests
# +ve for processes, -ve for threads
# Gunicorn uses --workers for process and --threads for threads
# therefor Gunicorn brokers should always be +ve
# recommended 2-4 workers per core (2-4 * number of core)
brokers=2

[gravatar]
url=https://www.gravatar.com/avatar
size=100
default=mm
rating=g

[cors]
origins = [
          "http://localhost:5100",
          "http://localhost"
        ]

[token]
# 60 minutes * 24 hours = 1440 minutes
