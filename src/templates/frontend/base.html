<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}" xmlns="http://www.w3.org/1999/html">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="{{ APP_TITLE }}" content="{{ APP_TITLE }} App" />

    <title>{{ APP_TITLE }}</title>

    <link rel="icon" href="{{ url_for('static', path='/images/favicon.ico') }}" />
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/images/apple_touch_icon.png') }}" />
    <!--
      manifest.json provides metadata used when your web customer is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="{{ url_for('static', path='manifest.json') }}" />

    <link rel="stylesheet" href="{{ url_for('static', path='/css/tw.css') }}" />

    {% block header_scripts %}
    {% endblock %}
  </head>
  <body class="flex h-screen">
    {% block content %}
    {% endblock %}

    {% block scripts %}
    {% endblock %}
  </body>
</html>
